<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Index · HTML Files</title>
    <style>
        /* ── reset & base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: #cccccc;
            --card-bg: #f8f8f8;
            --hover: #eeeeee;
            --shadow: rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #ffffff;
                --border: #333333;
                --card-bg: #111111;
                --hover: #1a1a1a;
                --shadow: rgba(255, 255, 255, 0.04);
            }
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            font-weight: 400;
            line-height: 1.6;
            padding: 24px 16px 48px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* ── container ── */
        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── header ── */
        .header {
            padding-bottom: 20px;
            border-bottom: 2px solid var(--fg);
            margin-bottom: 28px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header .count {
            font-size: 0.875rem;
            font-weight: 400;
            opacity: 0.6;
            white-space: nowrap;
            background: var(--card-bg);
            padding: 4px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        /* ── file list ── */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
        }

        .file-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            box-shadow: 0 2px 6px var(--shadow);
        }

        .file-item:active {
            transform: scale(0.98);
        }

        .file-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            text-decoration: none;
            color: var(--fg);
            font-weight: 450;
            font-size: 1.05rem;
            border-radius: var(--radius);
            transition: color 0.15s;
            width: 100%;
            min-height: 56px;
        }

        /* hover only on devices that support it */
        @media (hover: hover) {
            .file-item:hover {
                background: var(--hover);
                border-color: var(--fg);
            }
            .file-item:hover a {
                color: var(--fg);
            }
        }

        /* ── file icon (monochrome) ── */
        .file-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1.5px solid var(--fg);
            background: transparent;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--fg);
            transition: background 0.15s, color 0.15s;
            line-height: 1;
        }

        .file-item a .file-name {
            flex: 1;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        /* ── small meta / extension hint ── */
        .file-ext {
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.45;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 100px;
            border: 1px solid var(--border);
            transition: opacity 0.15s;
        }

        @media (hover: hover) {
            .file-item:hover .file-ext {
                opacity: 0.8;
            }
        }

        /* ── empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px 50px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: var(--card-bg);
        }

        .empty-state .empty-icon {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.3;
            letter-spacing: 0.1em;
        }

        .empty-state h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 0.95rem;
            opacity: 0.55;
            max-width: 300px;
            margin: 0 auto;
        }

        /* ── footer ── */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            opacity: 0.4;
            text-align: center;
            letter-spacing: 0.02em;
        }

        /* ── utility ── */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* ── touch-friendly spacing ── */
        @media (max-width: 480px) {
            body {
                padding: 16px 12px 32px;
            }
            .header h1 {
                font-size: 1.45rem;
            }
            .file-item a {
                padding: 14px 14px;
                font-size: 0.98rem;
                gap: 12px;
            }
            .file-icon {
                width: 28px;
                height: 28px;
                font-size: 0.65rem;
            }
            .file-ext {
                font-size: 0.6rem;
                padding: 1px 8px;
            }
        }

        @media (max-width: 380px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header .count {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container" role="main">

        <!-- header -->
        <header class="header">
            <h1>📄 index</h1>
            <span class="count" id="fileCount">0 files</span>
        </header>

        <!-- file list -->
        <ul class="file-list" id="fileList" role="list">
            <!-- items injected by JavaScript -->
        </ul>

        <!-- footer -->
        <footer class="footer">
            <span>black &amp; white &bull; mobile first</span>
        </footer>

    </div>

    <script>
        (function() {
            'use strict';

            // ─── get all .html files in the current directory ───
            function getHtmlFiles() {
                // We use `document.currentScript` to get the base path.
                // But the simplest and most reliable approach for a static
                // index page is to fetch the directory listing via a trick:
                // we can't reliably list files client-side without a server.
                //
                // However, we CAN use the `import.meta` or `document.currentScript`
                // to get the current path, and then we can try to fetch a list
                // of files from the server. But since we want a purely static
                // solution that works without a backend, we'll use a different
                // approach: we'll scan the page for links that were added
                // by the server (like Apache's auto-index) — but that's unreliable.
                //
                // Instead, we'll provide a clean fallback: we'll list files
                // that are explicitly passed via a `data-files` attribute,
                // OR we'll try to fetch a directory listing via a simple
                // HTTP request to the current directory (which many servers
                // will respond to with an HTML listing).
                //
                // But for the most robust and clean UX, we'll do this:
                // 1. Try to fetch the current directory (GET /)
                // 2. Parse the HTML response for links ending in .html
                // 3. If that fails, fallback to a manual list or empty state.
                //
                // However, fetching the directory might fail due to CORS
                // or server configuration. So we'll also support a manual
                // list via a `data-files` attribute on the script tag.
                //
                // For this solution, we'll implement both:
                // - Auto-detect via fetch
                // - Fallback to a built-in list (which the user can override)
                //
                // Since the user asked for a page that shows "html file er site gulo",
                // we'll try to fetch and parse, and if that fails, we'll show
                // a helpful empty state with instructions.

                return new Promise(function(resolve) {
                    // First, check if there's a `data-files` attribute on the script tag
                    const scripts = document.getElementsByTagName('script');
                    let dataFiles = null;
                    for (let i = 0; i < scripts.length; i++) {
                        const s = scripts[i];
                        if (s.hasAttribute('data-files')) {
                            try {
                                dataFiles = JSON.parse(s.getAttribute('data-files'));
                                if (Array.isArray(dataFiles) && dataFiles.length > 0) {
                                    resolve(dataFiles);
                                    return;
                                }
                            } catch (_) { /* ignore */ }
                        }
                    }

                    // If no data-files, try to fetch the current directory
                    const baseUrl = window.location.href.replace(/\/[^/]*$/, '/');

                    fetch(baseUrl, {
                            method: 'GET',
                            headers: {
                                'Accept': 'text/html'
                            }
                        })
                        .then(function(response) {
                            if (!response.ok) throw new Error('fetch failed');
                            return response.text();
                        })
                        .then(function(html) {
                            // Parse the HTML and extract links to .html files
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(html, 'text/html');
                            const links = doc.querySelectorAll('a[href]');
                            const files = [];
                            const seen = new Set();

                            for (const link of links) {
                                let href = link.getAttribute('href');
                                if (!href) continue;
                                // Decode URI to handle %20 etc.
                                try {
                                    href = decodeURIComponent(href);
                                } catch (_) { /* keep as-is */ }
                                // Only keep .html files (case-insensitive)
                                if (/\.html$/i.test(href)) {
                                    // Remove query params and hash
                                    const clean = href.split('?')[0].split('#')[0];
                                    if (clean && !seen.has(clean)) {
                                        seen.add(clean);
                                        files.push(clean);
                                    }
                                }
                            }

                            if (files.length > 0) {
                                resolve(files.sort());
                            } else {
                                // No .html files found via fetch
                                resolve([]);
                            }
                        })
                        .catch(function() {
                            // Fetch failed — show empty state
                            resolve([]);
                        });
                });
            }

            // ─── render file list ───
            function renderFiles(files) {
                const listEl = document.getElementById('fileList');
                const countEl = document.getElementById('fileCount');

                if (!listEl) return;

                // Clear existing
                listEl.innerHTML = '';

                if (!files || files.length === 0) {
                    // Empty state
                    listEl.innerHTML = `
                                <li class="empty-state" role="status">
                                    <div class="empty-icon">⸻</div>
                                    <h2>no .html files found</h2>
                                    <p>place your <strong>.html</strong> files in this folder</p>
                                </li>
                            `;
                    countEl.textContent = '0 files';
                    return;
                }

                // Sort alphabetically (case-insensitive)
                const sorted = [...files].sort(function(a, b) {
                    return a.localeCompare(b, undefined, { sensitivity: 'base' });
                });

                countEl.textContent = sorted.length + ' file' + (sorted.length > 1 ? 's' : '');

                // Build list items
                let html = '';
                for (const file of sorted) {
                    // Extract base name without extension for display
                    const displayName = file.replace(/\.html$/i, '');
                    // Get extension (should be .html)
                    const ext = file.includes('.') ? file.split('.').pop() : 'html';

                    html += `
                                <li class="file-item" role="listitem">
                                    <a href="${escapeHtml(file)}" title="${escapeHtml(file)}">
                                        <span class="file-icon" aria-hidden="true">${escapeHtml(ext)}</span>
                                        <span class="file-name">${escapeHtml(displayName)}</span>
                                        <span class="file-ext" aria-hidden="true">${escapeHtml(ext)}</span>
                                    </a>
                                </li>
                            `;
                }

                listEl.innerHTML = html;
            }

            // ─── simple escape to prevent XSS ───
            function escapeHtml(str) {
                if (!str) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return str.replace(/[&<>"']/g, function(m) { return map[m]; });
            }

            // ─── init ───
            getHtmlFiles().then(function(files) {
                renderFiles(files);
            }).catch(function() {
                renderFiles([]);
            });

        })();
    </script>

</body>
</html>
