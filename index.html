<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Index · HTML files</title>
    <style>
        /* ── reset & base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: #cccccc;
            --card-bg: #f8f8f8;
            --hover: #eeeeee;
            --shadow: rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #ffffff;
                --border: #333333;
                --card-bg: #111111;
                --hover: #1a1a1a;
                --shadow: rgba(255, 255, 255, 0.04);
            }
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            font-weight: 400;
            line-height: 1.6;
            padding: 24px 16px 48px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── header ── */
        .header {
            padding-bottom: 20px;
            border-bottom: 2px solid var(--fg);
            margin-bottom: 28px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header .count {
            font-size: 0.875rem;
            font-weight: 400;
            opacity: 0.6;
            white-space: nowrap;
            background: var(--card-bg);
            padding: 4px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        /* ── file list ── */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
        }

        .file-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            box-shadow: 0 2px 6px var(--shadow);
        }

        .file-item:active {
            transform: scale(0.98);
        }

        .file-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            text-decoration: none;
            color: var(--fg);
            font-weight: 450;
            font-size: 1.05rem;
            border-radius: var(--radius);
            transition: color 0.15s;
            width: 100%;
            min-height: 56px;
        }

        @media (hover: hover) {
            .file-item:hover {
                background: var(--hover);
                border-color: var(--fg);
            }
            .file-item:hover a {
                color: var(--fg);
            }
        }

        .file-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1.5px solid var(--fg);
            background: transparent;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--fg);
            transition: background 0.15s, color 0.15s;
            line-height: 1;
        }

        .file-item a .file-name {
            flex: 1;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .file-ext {
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.45;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 100px;
            border: 1px solid var(--border);
            transition: opacity 0.15s;
        }

        @media (hover: hover) {
            .file-item:hover .file-ext {
                opacity: 0.8;
            }
        }

        /* ── empty / loading / error ── */
        .empty-state,
        .loading-state,
        .error-state {
            text-align: center;
            padding: 60px 20px 50px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: var(--card-bg);
        }

        .empty-state .empty-icon,
        .loading-state .loading-icon,
        .error-state .error-icon {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.3;
            letter-spacing: 0.1em;
        }

        .empty-state h2,
        .loading-state h2,
        .error-state h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .empty-state p,
        .loading-state p,
        .error-state p {
            font-size: 0.95rem;
            opacity: 0.55;
            max-width: 300px;
            margin: 0 auto;
        }

        .error-state .error-icon {
            opacity: 0.6;
        }

        /* ── footer ── */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            opacity: 0.4;
            text-align: center;
            letter-spacing: 0.02em;
        }

        /* ── touch-friendly ── */
        @media (max-width: 480px) {
            body {
                padding: 16px 12px 32px;
            }
            .header h1 {
                font-size: 1.45rem;
            }
            .file-item a {
                padding: 14px 14px;
                font-size: 0.98rem;
                gap: 12px;
            }
            .file-icon {
                width: 28px;
                height: 28px;
                font-size: 0.65rem;
            }
            .file-ext {
                font-size: 0.6rem;
                padding: 1px 8px;
            }
        }

        @media (max-width: 380px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header .count {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container" role="main">

        <header class="header">
            <h1>📄 index</h1>
            <span class="count" id="fileCount">loading…</span>
        </header>

        <ul class="file-list" id="fileList" role="list">
            <!-- loading state injected by JS -->
        </ul>

        <footer class="footer">
            <span>black &amp; white &bull; mobile first</span>
        </footer>

    </div>

    <script>
        (function() {
            'use strict';

            const listEl = document.getElementById('fileList');
            const countEl = document.getElementById('fileCount');

            // ─── helper: escape HTML ───
            function escapeHtml(str) {
                if (!str) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return str.replace(/[&<>"']/g, function(m) { return map[m]; });
            }

            // ─── show loading state ───
            function showLoading() {
                listEl.innerHTML = `
                            <li class="loading-state" role="status">
                                <div class="loading-icon">⏳</div>
                                <h2>loading files…</h2>
                                <p>fetching from GitHub</p>
                            </li>
                        `;
                countEl.textContent = '…';
            }

            // ─── show error state ───
            function showError(message) {
                listEl.innerHTML = `
                            <li class="error-state" role="alert">
                                <div class="error-icon">⚠︎</div>
                                <h2>could not load files</h2>
                                <p>${escapeHtml(message || 'please check your repo or network')}</p>
                            </li>
                        `;
                countEl.textContent = 'error';
            }

            // ─── show empty state ───
            function showEmpty() {
                listEl.innerHTML = `
                            <li class="empty-state" role="status">
                                <div class="empty-icon">⸻</div>
                                <h2>no other .html files</h2>
                                <p>place your <strong>.html</strong> files in the repo root</p>
                            </li>
                        `;
                countEl.textContent = '0 files';
            }

            // ─── render file list ───
            function renderFiles(files) {
                if (!files || files.length === 0) {
                    showEmpty();
                    return;
                }

                // Sort alphabetically (case-insensitive)
                const sorted = [...files].sort(function(a, b) {
                    return a.localeCompare(b, undefined, { sensitivity: 'base' });
                });

                countEl.textContent = sorted.length + ' file' + (sorted.length > 1 ? 's' : '');

                let html = '';
                for (const file of sorted) {
                    const displayName = file.replace(/\.html$/i, '');
                    const ext = file.includes('.') ? file.split('.').pop() : 'html';

                    // Build relative URL: ./filename.html
                    const href = './' + encodeURIComponent(file);

                    html += `
                                <li class="file-item" role="listitem">
                                    <a href="${escapeHtml(href)}" title="${escapeHtml(file)}">
                                        <span class="file-icon" aria-hidden="true">${escapeHtml(ext)}</span>
                                        <span class="file-name">${escapeHtml(displayName)}</span>
                                        <span class="file-ext" aria-hidden="true">${escapeHtml(ext)}</span>
                                    </a>
                                </li>
                            `;
                }

                listEl.innerHTML = html;
            }

            // ─── get repo owner & name from current URL ───
            function getRepoInfo() {
                const host = window.location.hostname;
                const path = window.location.pathname;

                // For GitHub Pages: username.github.io[/repo]
                // If it's a project page, the repo name is the first segment after the host.
                // If it's a user page (username.github.io), the repo name is empty.

                // Extract username from host (assumes .github.io domain)
                let username = null;
                if (host.endsWith('.github.io')) {
                    username = host.replace(/\.github\.io$/, '');
                } else {
                    // not a standard github.io domain — fallback
                    username = null;
                }

                // Extract repo name from path
                let repo = null;
                const parts = path.split('/').filter(p => p.length > 0);
                if (parts.length > 0) {
                    // The first part is the repo name (for project pages)
                    // For user pages, the path might be empty or contain something else
                    // We'll assume the first segment is the repo name if it's not empty.
                    repo = parts[0];
                }

                // If we are at the root of a user site (username.github.io), repo is null
                // In that case, we can't use the GitHub API for contents because it's the root of the user.
                // But the user has a repo "w", so we can use that.

                // Since the user explicitly said the repo is "w", we can fallback to that.
                // But we'll try to auto-detect first.

                // If we couldn't detect, use a data attribute or hardcode?
                // We'll use the detected values, and if they are null, we'll show an error.

                return { username, repo };
            }

            // ─── fetch files from GitHub API ───
            function fetchFilesFromGitHub() {
                const { username, repo } = getRepoInfo();

                if (!username || !repo) {
                    // Fallback: try to use the repo name from the path
                    // For the user's case: https://nex-xy.github.io/w/ -> username=nex-xy, repo=w
                    // So if detection fails, we can try to parse again.
                    // But let's just show an error.
                    return Promise.reject(new Error('Could not detect GitHub repo from URL.'));
                }

                const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/`;

                return fetch(apiUrl, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                }).then(function(response) {
                    if (!response.ok) {
                        return response.json().then(function(err) {
                            throw new Error(err.message || `HTTP ${response.status}`);
                        }).catch(function() {
                            throw new Error(`HTTP ${response.status} — ${response.statusText}`);
                        });
                    }
                    return response.json();
                }).then(function(data) {
                    if (!Array.isArray(data)) {
                        throw new Error('Unexpected API response');
                    }

                    // Filter for .html files, exclude index.html
                    const htmlFiles = data
                        .filter(function(item) {
                            return item.type === 'file' &&
                                item.name &&
                                item.name.endsWith('.html') &&
                                item.name.toLowerCase() !== 'index.html';
                        })
                        .map(function(item) {
                            return item.name;
                        });

                    return htmlFiles;
                });
            }

            // ─── main ───
            function init() {
                showLoading();

                fetchFilesFromGitHub()
                    .then(function(files) {
                        renderFiles(files);
                    })
                    .catch(function(err) {
                        console.warn('GitHub API error:', err);
                        // If the API fails, we can try a fallback: use a static list from a data attribute.
                        // But for now, show the error.
                        showError(err.message || 'GitHub API request failed');
                    });
            }

            // ─── start ───
            init();

        })();
    </script>

</body>
</html>
