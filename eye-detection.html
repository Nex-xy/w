<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Blink Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #c8b8ff;
      letter-spacing: 1px;
    }

    p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    #video-container {
      position: relative;
      width: 640px;
      max-width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #2e2e50;
      box-shadow: 0 0 40px rgba(120, 80, 255, 0.15);
    }

    video, canvas {
      display: block;
      width: 100%;
      border-radius: 12px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #status-bar {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 15px;
    }

    #status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }

    #status-dot.open   { background: #4cff91; box-shadow: 0 0 10px #4cff91aa; }
    #status-dot.closed { background: #ff4c4c; box-shadow: 0 0 10px #ff4c4caa; }

    #status-text { font-weight: 500; }

    #ear-display {
      margin-top: 14px;
      font-size: 13px;
      color: #666;
    }

    #ear-display span { color: #aaa; font-weight: 600; }

    #start-btn {
      margin-top: 22px;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, #6a3de8, #3d6ae8);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #start-btn:hover { opacity: 0.88; transform: scale(1.02); }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #loading-msg {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      display: none;
    }

    #alert-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(255, 60, 60, 0.92);
      color: #fff;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      display: none;
      z-index: 999;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div id="alert-banner">⚠️ EYES CLOSED — ALERT!</div>

<h1>👁️ Eye Blink Detector</h1>
<p class="subtitle">Uses your webcam to detect if your eyes are open or closed</p>

<div id="video-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Waiting to start…</span>
</div>

<div id="ear-display">Eye Openness (EAR): <span id="ear-value">—</span></div>

<button id="start-btn">Start Detection</button>
<p id="loading-msg">Loading face model… please wait.</p>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
const VIDEO      = document.getElementById('video');
const CANVAS     = document.getElementById('overlay');
const DOT        = document.getElementById('status-dot');
const STATUS     = document.getElementById('status-text');
const EAR_VAL    = document.getElementById('ear-value');
const START_BTN  = document.getElementById('start-btn');
const LOADING    = document.getElementById('loading-msg');
const BANNER     = document.getElementById('alert-banner');

const EAR_THRESHOLD = 0.22;
const CONSEC_FRAMES = 3;
let closedFrames = 0;
let alertPlaying = false;
let audioCtx = null;
let beepNode  = null;
let detecting = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startBeep() {
  if (alertPlaying) return;
  alertPlaying = true;
  BANNER.style.display = 'block';
  const ctx = getAudioCtx();
  beepNode = ctx.createOscillator();
  const gain = ctx.createGain();
  beepNode.type = 'sine';
  beepNode.frequency.value = 880;
  gain.gain.value = 0.6;
  beepNode.connect(gain);
  gain.connect(ctx.destination);
  beepNode.start();
}

function stopBeep() {
  if (!alertPlaying) return;
  alertPlaying = false;
  BANNER.style.display = 'none';
  if (beepNode) { try { beepNode.stop(); } catch(e){} beepNode = null; }
}

function eyeAspectRatio(pts) {
  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const v1 = dist(pts[1], pts[5]);
  const v2 = dist(pts[2], pts[4]);
  const h  = dist(pts[0], pts[3]);
  return (v1 + v2) / (2 * h);
}

async function loadModels() {
  LOADING.style.display = 'block';
  START_BTN.disabled = true;
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
  LOADING.style.display = 'none';
  START_BTN.disabled = false;
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
  VIDEO.srcObject = stream;
  return new Promise(res => VIDEO.onloadedmetadata = () => {
    CANVAS.width  = VIDEO.videoWidth;
    CANVAS.height = VIDEO.videoHeight;
    res();
  });
}

async function detect() {
  if (!detecting) return;
  const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.4 });
  const result = await faceapi.detectSingleFace(VIDEO, opts).withFaceLandmarks(true);
  const ctx = CANVAS.getContext('2d');
  ctx.clearRect(0, 0, CANVAS.width, CANVAS.height);

  if (result) {
    const lm = result.landmarks;
    const leftEye  = lm.getLeftEye();
    const rightEye = lm.getRightEye();
    const earL = eyeAspectRatio(leftEye);
    const earR = eyeAspectRatio(rightEye);
    const ear  = (earL + earR) / 2;
    EAR_VAL.textContent = ear.toFixed(3);

    const eyesClosed = ear < EAR_THRESHOLD;
    if (eyesClosed) {
      closedFrames++;
    } else {
      closedFrames = 0;
    }

    const alert = closedFrames >= CONSEC_FRAMES;

    if (alert) {
      startBeep();
      DOT.className = 'closed';
      STATUS.textContent = '😴 Eyes CLOSED — beeping!';
    } else {
      stopBeep();
      DOT.className = 'open';
      STATUS.textContent = eyesClosed ? '👁️ Blinking…' : '✅ Eyes Open';
    }

    drawEye(ctx, leftEye,  alert ? '#ff4c4c' : '#4cff91');
    drawEye(ctx, rightEye, alert ? '#ff4c4c' : '#4cff91');

  } else {
    stopBeep();
    DOT.className = '';
    STATUS.textContent = '🔍 No face detected';
    EAR_VAL.textContent = '—';
    closedFrames = 0;
  }

  requestAnimationFrame(detect);
}

function drawEye(ctx, pts, color) {
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = color + '22';
  ctx.fill();
}

START_BTN.addEventListener('click', async () => {
  START_BTN.disabled = true;
  START_BTN.textContent = 'Starting…';
  try {
    await loadModels();
    await startCamera();
    detecting = true;
    START_BTN.textContent = 'Running…';
    detect();
  } catch(e) {
    STATUS.textContent = '❌ Error: ' + e.message;
    START_BTN.disabled = false;
    START_BTN.textContent = 'Retry';
  }
});
</script>
</body>
</html>
