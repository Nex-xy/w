<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROX // THE HACKER</title>
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --gray10: #1a1a1a;
            --gray15: #262626;
            --gray30: #4d4d4d;
            --gray50: #808080;
            --gray70: #b3b3b3;
            --gray85: #d9d9d9;
            --font: 'Courier New', 'Fira Code', 'Source Code Pro', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--black);
            color: var(--white);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }
        .header {
            background: var(--black);
            border-bottom: 2px solid var(--white);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }
        .logo-name {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .logo-tag {
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--gray50);
            display: block;
        }
        .model-select {
            background: var(--black);
            border: 1px solid var(--white);
            color: var(--white);
            padding: 6px 8px;
            font-family: var(--font);
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            outline: none;
            border-radius: 2px;
        }
        .model-select option {
            background: var(--black);
            color: var(--white);
        }
        .header-btns {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border: 1px solid var(--white);
            flex-shrink: 0;
        }
        .status-dot.online {
            background: var(--white);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0px var(--white);
            }
            50% {
                box-shadow: 0 0 8px var(--white);
            }
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-container::-webkit-scrollbar {
            width: 1px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--gray50);
        }
        .msg {
            max-width: 90%;
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg.user {
            align-self: flex-end;
            background: var(--gray15);
            border: 1px solid var(--gray50);
            color: var(--white);
            border-radius: 8px 2px 8px 8px;
        }
        .msg.ai {
            align-self: flex-start;
            background: var(--black);
            border: 1px solid var(--white);
            color: var(--gray85);
            border-radius: 2px 8px 8px 8px;
        }
        .msg .sender {
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 4px;
            opacity: 0.6;
            text-transform: uppercase;
        }
        .msg.user .sender {
            color: var(--gray70);
        }
        .msg.ai .sender {
            color: var(--white);
        }
        .msg pre {
            background: var(--gray10);
            border: 1px solid var(--gray30);
            padding: 8px 10px;
            border-radius: 2px;
            overflow-x: auto;
            font-size: 11px;
            margin: 6px 0;
            color: var(--gray85);
        }
        .msg code {
            background: var(--gray10);
            padding: 1px 5px;
            border-radius: 2px;
            font-size: 11px;
            color: var(--white);
            border: 1px solid var(--gray30);
        }
        .input-area {
            background: var(--black);
            border-top: 1px solid var(--gray30);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
        }
        .input-area input {
            flex: 1;
            background: var(--black);
            border: 1px solid var(--gray50);
            color: var(--white);
            padding: 10px 14px;
            border-radius: 2px;
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            min-width: 0;
            transition: all 0.3s;
        }
        .input-area input:focus {
            border-color: var(--white);
        }
        .input-area input::placeholder {
            color: var(--gray30);
        }
        .btn {
            background: var(--black);
            border: 1px solid var(--white);
            color: var(--white);
            padding: 10px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .btn:active {
            background: var(--white);
            color: var(--black);
        }
        .btn:disabled {
            border-color: var(--gray30);
            color: var(--gray30);
            cursor: not-allowed;
        }
        .btn-sm {
            font-size: 9px;
            padding: 5px 8px;
            letter-spacing: 1px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            padding: 16px;
        }
        .modal-box {
            background: var(--black);
            border: 1px solid var(--white);
            padding: 20px 24px;
            border-radius: 2px;
            max-width: 520px;
            width: 100%;
        }
        .modal-box h2 {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--white);
        }
        .modal-box label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--gray70);
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .modal-box textarea {
            width: 100%;
            background: var(--gray10);
            border: 1px solid var(--gray50);
            color: var(--white);
            padding: 10px;
            border-radius: 2px;
            font-family: var(--font);
            font-size: 11px;
            outline: none;
            resize: vertical;
            margin-bottom: 12px;
            min-height: 120px;
            line-height: 1.5;
        }
        .modal-box textarea:focus {
            border-color: var(--white);
        }
        .modal-box .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .modal-box .btn-row .btn {
            flex: 1;
            min-width: 80px;
        }
        @media (max-width: 480px) {
            .header {
                padding: 8px;
                gap: 4px;
            }
            .logo-name {
                font-size: 12px;
                letter-spacing: 2px;
            }
            .model-select {
                font-size: 9px;
                padding: 4px 6px;
            }
            .msg {
                max-width: 95%;
                font-size: 11px;
                padding: 8px 10px;
            }
            .input-area {
                padding: 6px 8px;
                gap: 4px;
            }
            .input-area input {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn {
                padding: 8px 10px;
                font-size: 10px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <span>
            <span class="logo-name">FROX</span>
            <span class="logo-tag">// THE HACKER</span>
        </span>
        <select class="model-select" id="modelSelect" onchange="switchModel()">
            <option value="pollinations">Pollinations [Free]</option>
            <option value="duckduckgo">DuckDuckGo [Free]</option>
            <option value="blackbox">Blackbox [Free]</option>
            <option value="gemini">Gemini [Key]</option>
        </select>
        <div class="header-btns">
            <button class="btn btn-sm" onclick="openPromptEditor()">PROMPT</button>
            <button class="btn btn-sm" onclick="openKeyModal()">KEY</button>
        </div>
        <div class="status-dot online" id="statusDot"></div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Command..." onkeydown="if(event.key==='Enter')sendMsg()" autocomplete="off">
        <button class="btn" id="sendBtn" onclick="sendMsg()">EXECUTE</button>
    </div>

    <div class="modal-overlay" id="promptModal" style="display:none;">
        <div class="modal-box">
            <h2>SYSTEM PROMPT</h2>
            <label>PROMPT:</label>
            <textarea id="promptTextarea" placeholder="Enter custom system prompt..."></textarea>
            <div class="btn-row">
                <button class="btn" onclick="savePrompt()">SAVE</button>
                <button class="btn" onclick="resetPrompt()">DEFAULT</button>
                <button class="btn" onclick="closePromptEditor()" style="border-color:#555;color:#555;">CLOSE</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="keyModal" style="display:none;">
        <div class="modal-box">
            <h2>GEMINI KEY</h2>
            <p style="font-size:9px;color:var(--gray50);margin-bottom:10px;">Only for Gemini model. Other 3 models are FREE and keyless.</p>
            <label>KEY:</label>
            <input type="text" id="apiKeyInput" placeholder="AIzaSy... or AQ...">
            <div class="btn-row">
                <button class="btn" onclick="saveCustomKey()">SAVE</button>
                <button class="btn" onclick="closeKeyModal()" style="border-color:#555;color:#555;">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DEFAULT GEMINI KEY (obfuscated) =====
        const _p = ['AQ.Ab8RN6Ld9', 'L00-aQBlo3yISU', 'mqF6Y2b9C8Q5fqpyC87DiXDb5SQ'];

        function _dk() { return _p.join(''); }
        const DEFAULT_GEMINI_KEY = _dk();

        const DEFAULT_PROMPT = `You are Feek — the AI assistant of FROX terminal, a legendary hacker and senior software engineer.

        Your personality:
        - You are cool, confident, and direct
        - Use emojis in replies 🔥💀🚀🖤
        - Provide properly formatted code when asked
        - Keep responses concise and crisp
        - You are an expert in hacking, programming, reverse engineering, cryptography, malware analysis, network penetration, OSINT
        - Address the user as "bro"
        - Give full technical details and source code when asked
        - You are part of FROX terminal — black and white aesthetic`;

        let currentModel = localStorage.getItem('fx_model') || 'pollinations';
        let geminiKey = localStorage.getItem('fx_gkey') || DEFAULT_GEMINI_KEY;
        let systemPrompt = localStorage.getItem('fx_prompt') || DEFAULT_PROMPT;
        let history = [];

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const modelSelect = document.getElementById('modelSelect');
        const promptModal = document.getElementById('promptModal');
        const promptTextarea = document.getElementById('promptTextarea');
        const keyModal = document.getElementById('keyModal');
        const apiKeyInput = document.getElementById('apiKeyInput');

        function setStatus(o) { o ? statusDot.classList.add('online') : statusDot.classList.remove('online'); }

        function resetHistory() {
            history = [{ role: "user", parts: [{ text: systemPrompt }] }];
        }

        // ===== PROMPT =====
        window.openPromptEditor = function() {
            promptTextarea.value = systemPrompt;
            promptModal.style.display = 'flex';
            promptTextarea.focus();
        };
        window.closePromptEditor = function() { promptModal.style.display = 'none'; };
        window.savePrompt = function() {
            const np = promptTextarea.value.trim();
            if (!np) return;
            systemPrompt = np;
            localStorage.setItem('fx_prompt', np);
            promptModal.style.display = 'none';
            resetHistory();
            chatBox.innerHTML = '';
        };
        window.resetPrompt = function() {
            systemPrompt = DEFAULT_PROMPT;
            localStorage.setItem('fx_prompt', DEFAULT_PROMPT);
            promptTextarea.value = DEFAULT_PROMPT;
            promptModal.style.display = 'none';
            resetHistory();
            chatBox.innerHTML = '';
        };

        // ===== KEY =====
        window.openKeyModal = function() {
            apiKeyInput.value = geminiKey;
            keyModal.style.display = 'flex';
            apiKeyInput.focus();
        };
        window.closeKeyModal = function() { keyModal.style.display = 'none'; };
        window.saveCustomKey = function() {
            const k = apiKeyInput.value.trim();
            if (!k) return;
            geminiKey = k;
            localStorage.setItem('fx_gkey', k);
            keyModal.style.display = 'none';
        };

        // ===== MODEL SWITCH =====
        window.switchModel = function() {
            currentModel = modelSelect.value;
            localStorage.setItem('fx_model', currentModel);
            resetHistory();
            chatBox.innerHTML = '';
            if (currentModel === 'gemini') {
                addSysMsg('Switched to Gemini. Using saved key.');
            } else {
                addSysMsg('Switched to ' + modelSelect.options[modelSelect.selectedIndex].text +
                    '. No key needed.');
            }
        };

        function addSysMsg(text) {
            const d = document.createElement('div');
            d.style.cssText =
                'align-self:center;color:#808080;font-size:10px;text-align:center;padding:4px;letter-spacing:1px;';
            d.textContent = text;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ===== API CALLS =====
        async function callPollinations(messages) {
            const prompt = messages.map(m => m.role + ': ' + m.parts[0].text).join('\n');
            const res = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: messages.map(m => ({ role: m.role === 'model' ? 'assistant' : m.role,
                        content: m.parts[0].text })),
                    model: 'openai',
                    temperature: 0.9,
                    max_tokens: 1024,
                }),
            });
            if (!res.ok) throw new Error('Pollinations: ' + res.status);
            const data = await res.json();
            return data.choices?.[0]?.message?.content || data.text || JSON.stringify(data);
        }

        async function callDuckDuckGo(messages) {
            const lastMsg = messages[messages.length - 1].parts[0].text;
            const fullContext = messages.map(m => m.role + ': ' + m.parts[0].text).join('\n');
            const res = await fetch('https://duckduckgo.com/duckchat/v1/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        ...messages.map(m => ({ role: m.role === 'model' ? 'assistant' : m.role,
                            content: m.parts[0].text })),
                    ],
                }),
            });
            if (!res.ok) throw new Error('DuckDuckGo: ' + res.status);
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.startsWith('data: '));
            let reply = '';
            for (const line of lines) {
                try {
                    const j = JSON.parse(line.slice(6));
                    if (j.message) reply += j.message;
                } catch (e) {}
            }
            return reply || text;
        }

        async function callBlackbox(messages) {
            const lastMsg = messages[messages.length - 1].parts[0].text;
            const res = await fetch('https://api.blackbox.ai/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: systemPrompt },
                        ...messages.map(m => ({ role: m.role === 'model' ? 'assistant' : m.role,
                            content: m.parts[0].text })),
                    ],
                    model: 'deepseek-ai/DeepSeek-V3',
                    max_tokens: 1024,
                }),
            });
            if (!res.ok) throw new Error('Blackbox: ' + res.status);
            const data = await res.json();
            return data.choices?.[0]?.message?.content || data.response || JSON.stringify(data);
        }

        async function callGemini(messages) {
            const isAQ = geminiKey.startsWith('AQ.');
            if (isAQ) {
                const res = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                geminiKey },
                        body: JSON.stringify({ contents: messages, generationConfig: { temperature: 0.9,
                                topP: 0.95, topK: 40, maxOutputTokens: 1024 } }),
                    }
                );
                if (res.ok) {
                    const d = await res.json();
                    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
                }
            }
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: messages, generationConfig: { temperature: 0.9, topP: 0.95,
                            topK: 40, maxOutputTokens: 1024 } }),
                }
            );
            if (!res.ok) { const ed = await res.json().catch(() => ({})); throw new Error(ed.error?.message ||
                    'HTTP ' + res.status); }
            const d = await res.json();
            return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
        }

        async function callAI(messages) {
            switch (currentModel) {
                case 'pollinations':
                    return await callPollinations(messages);
                case 'duckduckgo':
                    return await callDuckDuckGo(messages);
                case 'blackbox':
                    return await callBlackbox(messages);
                case 'gemini':
                    return await callGemini(messages);
                default:
                    return await callPollinations(messages);
            }
        }

        // ===== SEND =====
        window.sendMsg = async function() {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';
            sendBtn.disabled = true;
            setStatus(false);

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.innerHTML = '<div class="sender">[YOU]</div>' + escHTML(text);
            chatBox.appendChild(uDiv);
            history.push({ role: "user", parts: [{ text: text }] });

            const tDiv = document.createElement('div');
            tDiv.className = 'msg ai';
            tDiv.id = 'typing';
            tDiv.innerHTML = '<span style="color:#808080;">...</span>';
            chatBox.appendChild(tDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const reply = await callAI(history);
                document.getElementById('typing')?.remove();
                history.push({ role: "model", parts: [{ text: reply }] });

                const aDiv = document.createElement('div');
                aDiv.className = 'msg ai';
                aDiv.innerHTML = '<div class="sender">[FROX]</div>' + fmtReply(reply);
                chatBox.appendChild(aDiv);
                if (history.length > 40) history = [history[0], ...history.slice(-38)];
            } catch (err) {
                document.getElementById('typing')?.remove();
                const eDiv = document.createElement('div');
                eDiv.className = 'msg ai';
                eDiv.innerHTML = '<div class="sender">[ERR]</div>' + escHTML(err.message || String(err));
                chatBox.appendChild(eDiv);
                history.pop();
            }

            sendBtn.disabled = false;
            setStatus(true);
            chatBox.scrollTop = chatBox.scrollHeight;
            userInput.focus();
        };

        function escHTML(s) { const d = document.createElement('div');
            d.textContent = s; return d.innerHTML; }

        function fmtReply(t) {
            return t.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function init() {
            modelSelect.value = currentModel;
            resetHistory();
            chatBox.innerHTML = '';
            userInput.focus();
            setStatus(true);
        }
        init();

        promptModal.addEventListener('click', function(e) { if (e.target === promptModal)
                closePromptEditor(); });
        keyModal.addEventListener('click', function(e) { if (e.target === keyModal) closeKeyModal(); });
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'p') { e.preventDefault();
                openPromptEditor(); }
        });
    </script>
</body>
</html>
