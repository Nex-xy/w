<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ NEX | Remote Display Control</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --glow: #ffffff;
            --font: 'Courier New', 'Fira Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
            overflow: hidden;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.1) 2px,
                    rgba(0,0,0,0.1) 4px);
            pointer-events: none;
            z-index: 999;
        }

        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 998;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        #waiting {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        #waiting .logo {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: 12px;
            color: #ffffff;
            text-shadow: 0 0 40px #ffffff, 0 0 80px #ffffff;
            animation: glitchFull 2.5s infinite;
            position: relative;
            display: inline-block;
        }

        @keyframes glitchFull {
            0%, 90%, 100% {
                transform: none;
                text-shadow: 0 0 40px #fff, 0 0 80px #fff;
            }
            92% {
                transform: translate(-3px, 2px) skewX(1deg);
                text-shadow: -3px 0 #aaa, 3px 0 #777, 0 0 40px #fff;
            }
            94% {
                transform: translate(3px, -1px) skewX(-1deg);
                text-shadow: 3px 0 #999, -3px 0 #666, 0 0 80px #fff;
            }
            96% {
                transform: translate(-2px, -2px);
                text-shadow: -2px 2px #888, 2px -2px #555, 0 0 40px #fff;
            }
            98% {
                transform: none;
                text-shadow: 0 0 40px #fff, 0 0 80px #fff;
            }
        }

        #waiting .tagline {
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.7;
            margin-top: 20px;
            animation: pulse 2s infinite;
            letter-spacing: 4px;
            color: #ffffff;
        }

        #waiting .status-bar {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            opacity: 0.5;
            color: #ffffff;
        }

        .blinking-dot {
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            animation: blink 1s infinite;
            box-shadow: 0 0 10px #ffffff;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.3; }
        }

        #display {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2;
            animation: fadeIn 0.5s ease;
        }

        .text-display {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            font-size: clamp(2rem, 8vw, 8rem);
            font-weight: 900;
            text-align: center;
            word-break: break-word;
            color: #ffffff;
            text-shadow: 0 0 30px #ffffff, 0 0 60px #ffffff;
            animation: textGlow 2s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff; }
            to { text-shadow: 0 0 40px #ffffff, 0 0 80px #ffffff, 0 0 120px #ffffff; }
        }

        .clock-display {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 30px #fff, 0 0 60px #fff;
            letter-spacing: 6px;
        }

        .alert-popup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 20px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .alert-popup .alert-box {
            background: #111;
            border: 2px solid #fff;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.3), inset 0 0 30px rgba(255,255,255,0.05);
        }

        .alert-popup .alert-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .alert-popup .alert-message {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #fff;
            letter-spacing: 2px;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .media-display {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            filter: grayscale(100%);
        }

        .audio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #000;
            gap: 20px;
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 100px;
            margin-bottom: 10px;
        }

        .visualizer .bar {
            width: 8px;
            background: #ffffff;
            border-radius: 4px;
            animation: visualize 1s infinite alternate;
            box-shadow: 0 0 10px #ffffff;
        }

        .visualizer .bar:nth-child(1) { height: 30px; animation-delay: 0s; }
        .visualizer .bar:nth-child(2) { height: 60px; animation-delay: 0.1s; }
        .visualizer .bar:nth-child(3) { height: 40px; animation-delay: 0.2s; }
        .visualizer .bar:nth-child(4) { height: 80px; animation-delay: 0.3s; }
        .visualizer .bar:nth-child(5) { height: 50px; animation-delay: 0.4s; }
        .visualizer .bar:nth-child(6) { height: 70px; animation-delay: 0.5s; }
        .visualizer .bar:nth-child(7) { height: 35px; animation-delay: 0.6s; }
        .visualizer .bar:nth-child(8) { height: 65px; animation-delay: 0.7s; }
        .visualizer .bar:nth-child(9) { height: 45px; animation-delay: 0.8s; }
        .visualizer .bar:nth-child(10) { height: 75px; animation-delay: 0.9s; }
        .visualizer .bar:nth-child(11) { height: 55px; animation-delay: 1s; }
        .visualizer .bar:nth-child(12) { height: 90px; animation-delay: 1.1s; }

        @keyframes visualize {
            0% { transform: scaleY(0.4); opacity: 0.5; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .audio-container audio {
            width: 90%;
            max-width: 500px;
            outline: none;
            border-radius: 10px;
            background: #111;
            padding: 5px;
            filter: grayscale(100%);
        }

        .audio-container .audio-label {
            color: #ffffff;
            font-size: clamp(1rem, 3vw, 1.5rem);
            text-shadow: 0 0 10px #ffffff;
            letter-spacing: 2px;
        }

        .html-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            filter: grayscale(100%);
        }

        .error-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #ffffff;
            text-shadow: 0 0 20px #ffffff;
            padding: 20px;
            text-align: center;
            gap: 15px;
        }

        .error-display .icon {
            font-size: 4rem;
        }

        .timestamp {
            position: fixed;
            bottom: 15px;
            right: 20px;
            z-index: 10;
            font-size: 0.8rem;
            opacity: 0.4;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .battery-indicator {
            position: fixed;
            bottom: 15px;
            left: 20px;
            z-index: 10;
            font-size: 0.8rem;
            opacity: 0.4;
            color: #ffffff;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .visualizer .bar { width: 5px; }
            .visualizer { gap: 2px; height: 60px; }
            .timestamp { bottom: 10px; right: 10px; font-size: 0.7rem; }
            .battery-indicator { bottom: 10px; left: 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <div id="waiting">
        <div class="logo">NEX</div>
        <p class="tagline">AWAITING SIGNAL...</p>
        <div class="status-bar">
            <span class="blinking-dot"></span>
            <span>SECURE CHANNEL ACTIVE</span>
        </div>
    </div>

    <div id="display"></div>

    <div class="timestamp" id="timestamp"></div>
    <div class="battery-indicator" id="battery"></div>

    <script>
        // ==================== CONFIGURATION ====================
        const BOT_TOKEN = "8829949380:AAH7Jdq-jgHFrhbDMqEY3g_nPPLbb9Zx03c";
        const USER_ID = 7248712040;

        // ==================== GLOBALS ====================
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;
        let lastUpdateId = 0;
        let isFirstFetch = true;
        let pollingInterval = null;
        const POLL_DELAY = 3000;
        let notificationSound = true;
        let clockInterval = null;

        const waitingDiv = document.getElementById('waiting');
        const displayDiv = document.getElementById('display');
        const timestampEl = document.getElementById('timestamp');
        const batteryEl = document.getElementById('battery');
        const flashOverlay = document.getElementById('flash-overlay');

        const AUDIO_MIMES = ['audio/mpeg', 'audio/mp3', 'audio/wav', 'audio/ogg', 'audio/aac', 'audio/flac', 'audio/webm', 'audio/x-m4a'];
        const VIDEO_MIMES = ['video/mp4', 'video/webm', 'video/ogg', 'video/quicktime', 'video/x-msvideo', 'video/x-matroska'];
        const HTML_EXTS = ['.html', '.htm'];
        const TEXT_EXTS = ['.txt', '.css', '.js', '.json', '.xml', '.csv', '.md'];
        const AUDIO_EXTS = ['.mp3', '.wav', '.ogg', '.flac', '.m4a', '.aac', '.opus', '.wma'];
        const VIDEO_EXTS = ['.mp4', '.webm', '.mkv', '.avi', '.mov', '.wmv', '.flv', '.3gp'];
        const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.svg', '.ico'];

        // ==================== BATTERY ====================
        async function updateBattery() {
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging ? ' ⚡' : '';
                    batteryEl.textContent = `🔋 ${level}%${charging}`;
                    battery.addEventListener('levelchange', updateBattery);
                    battery.addEventListener('chargingchange', updateBattery);
                }
            } catch (e) {
                batteryEl.textContent = '';
            }
        }

        // ==================== HELPERS ====================

        function stopClock() {
            if (clockInterval) {
                clearInterval(clockInterval);
                clockInterval = null;
            }
        }

        function showWaiting() {
            stopClock();
            waitingDiv.style.display = 'block';
            displayDiv.style.display = 'none';
            displayDiv.innerHTML = '';
            timestampEl.textContent = '';
        }

        function showContent() {
            stopClock();
            waitingDiv.style.display = 'none';
            displayDiv.style.display = 'block';
            const now = new Date();
            timestampEl.textContent = now.toLocaleTimeString();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function flashScreen() {
            flashOverlay.style.opacity = '1';
            setTimeout(() => { flashOverlay.style.opacity = '0'; }, 150);
        }

        function playBeep() {
            if (!notificationSound) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 800;
                osc.type = 'square';
                gain.gain.value = 0.05;
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        // ==================== TELEGRAM API ====================

        async function fetchUpdates() {
            try {
                let url;
                if (isFirstFetch) {
                    // First fetch: get ALL unconfirmed updates, we'll only show the LAST one
                    url = `${TELEGRAM_API}/getUpdates?timeout=10`;
                    isFirstFetch = false;
                } else {
                    url = `${TELEGRAM_API}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (!data.ok) {
                    console.error('API Error:', data.description);
                    return;
                }

                if (data.result && data.result.length > 0) {
                    // On first fetch, only process the LAST update (most recent previous message)
                    if (isFirstFetch === false && lastUpdateId === 0) {
                        // This is the first batch, take only the last one
                        const lastUpdate = data.result[data.result.length - 1];
                        processUpdate(lastUpdate);
                        lastUpdateId = lastUpdate.update_id;
                    } else {
                        // Subsequent fetches: process all new updates
                        for (const update of data.result) {
                            processUpdate(update);
                            if (update.update_id > lastUpdateId) {
                                lastUpdateId = update.update_id;
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Network Error:', error);
            }
        }

        function processUpdate(update) {
            if (!update.message) return;

            const msg = update.message;
            const fromId = msg.from.id;

            if (fromId !== USER_ID) return;

            playBeep();

            if (msg.text) {
                handleText(msg.text);
            }
            else if (msg.photo && msg.photo.length > 0) {
                const largestPhoto = msg.photo[msg.photo.length - 1];
                handleMedia(largestPhoto.file_id, 'photo');
            }
            else if (msg.video) {
                handleMedia(msg.video.file_id, 'video');
            }
            else if (msg.audio) {
                handleMedia(msg.audio.file_id, 'audio');
            }
            else if (msg.voice) {
                handleMedia(msg.voice.file_id, 'audio');
            }
            else if (msg.document) {
                handleDocument(msg.document);
            }
        }

        function handleText(text) {
            const cmd = text.trim().toLowerCase();

            if (cmd === '/clear') {
                showWaiting();
                return;
            }

            if (cmd === '/fullscreen') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
                return;
            }

            if (cmd === '/sound off') {
                notificationSound = false;
                return;
            }

            if (cmd === '/sound on') {
                notificationSound = true;
                return;
            }

            if (cmd === '/flash') {
                flashScreen();
                return;
            }

            if (cmd === '/clock') {
                showClock();
                return;
            }

            if (cmd.startsWith('/alert ')) {
                const alertMsg = text.trim().substring(7);
                showAlert(alertMsg);
                return;
            }

            if (cmd === '/reset') {
                showWaiting();
                return;
            }

            // Regular text
            showContent();
            displayDiv.innerHTML = `<div class="text-display">${escapeHtml(text)}</div>`;
        }

        function showClock() {
            stopClock();
            showContent();
            displayDiv.innerHTML = `<div class="clock-display" id="clock">00:00:00</div>`;
            function tick() {
                const now = new Date();
                const el = document.getElementById('clock');
                if (el) {
                    el.textContent = now.toLocaleTimeString();
                }
            }
            tick();
            clockInterval = setInterval(tick, 1000);
        }

        function showAlert(message) {
            showContent();
            displayDiv.innerHTML = `
                <div class="alert-popup">
                    <div class="alert-box">
                        <div class="alert-icon">⚠️</div>
                        <div class="alert-message">${escapeHtml(message)}</div>
                    </div>
                </div>
            `;
        }

        async function handleMedia(fileId, type) {
            try {
                const fileUrl = await getFileUrl(fileId);
                if (!fileUrl) throw new Error('File URL not found');

                showContent();

                if (type === 'photo') {
                    displayDiv.innerHTML = `<img class="media-display" src="${fileUrl}" alt="Photo" loading="eager">`;
                }
                else if (type === 'video') {
                    displayDiv.innerHTML = `
                        <video class="media-display" autoplay loop controls playsinline>
                            <source src="${fileUrl}">
                        </video>
                    `;
                }
                else if (type === 'audio') {
                    displayDiv.innerHTML = `
                        <div class="audio-container">
                            <div class="visualizer">
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            </div>
                            <audio id="audioPlayer" controls loop>
                                <source src="${fileUrl}">
                            </audio>
                            <p class="audio-label">▶ NOW PLAYING</p>
                        </div>
                    `;
                    tryAutoPlay();
                }
            } catch (error) {
                console.error(`${type} load error:`, error);
                displayDiv.innerHTML = `
                    <div class="error-display">
                        <span class="icon">⚠️</span>
                        Failed to load ${type}
                    </div>
                `;
            }
        }

        function tryAutoPlay() {
            const audio = document.getElementById('audioPlayer');
            if (!audio) return;
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    const p = document.querySelector('.audio-label');
                    if (p) p.textContent = '👆 TAP PLAY TO START';
                });
            }
        }

        async function handleDocument(doc) {
            const mimeType = doc.mime_type || '';
            const fileName = (doc.file_name || '').toLowerCase();

            if (mimeType.startsWith('text/html') || HTML_EXTS.some(ext => fileName.endsWith(ext))) {
                await handleHtmlDocument(doc.file_id);
                return;
            }

            if (mimeType.startsWith('text/') || TEXT_EXTS.some(ext => fileName.endsWith(ext))) {
                await handleTextDocument(doc.file_id);
                return;
            }

            if (AUDIO_MIMES.includes(mimeType) || AUDIO_EXTS.some(ext => fileName.endsWith(ext))) {
                handleMedia(doc.file_id, 'audio');
                return;
            }

            if (VIDEO_MIMES.includes(mimeType) || VIDEO_EXTS.some(ext => fileName.endsWith(ext))) {
                handleMedia(doc.file_id, 'video');
                return;
            }

            if (mimeType.startsWith('image/') || IMAGE_EXTS.some(ext => fileName.endsWith(ext))) {
                handleMedia(doc.file_id, 'photo');
                return;
            }

            showContent();
            displayDiv.innerHTML = `
                <div class="error-display">
                    <span class="icon">📄</span>
                    Unsupported file<br>
                    <small style="font-size:1rem;">${escapeHtml(fileName || mimeType)}</small>
                </div>
            `;
        }

        async function handleHtmlDocument(fileId) {
            try {
                const fileUrl = await getFileUrl(fileId);
                if (!fileUrl) throw new Error('File URL not found');

                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error('Failed to fetch HTML');
                const htmlContent = await response.text();

                showContent();
                const escapedHtml = htmlContent.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                displayDiv.innerHTML = `<iframe class="html-frame" srcdoc="${escapedHtml}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`;
            } catch (error) {
                console.error('HTML load error:', error);
                try {
                    const fileUrl = await getFileUrl(fileId);
                    showContent();
                    displayDiv.innerHTML = `<iframe class="html-frame" src="${fileUrl}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>`;
                } catch (e) {
                    displayDiv.innerHTML = `
                        <div class="error-display">
                            <span class="icon">❌</span>
                            Failed to load HTML file
                        </div>
                    `;
                }
            }
        }

        async function handleTextDocument(fileId) {
            try {
                const fileUrl = await getFileUrl(fileId);
                if (!fileUrl) throw new Error('File URL not found');

                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error('Failed to fetch text file');
                const textContent = await response.text();

                showContent();
                displayDiv.innerHTML = `
                    <div class="text-display" style="font-size: clamp(1rem, 4vw, 2rem); white-space: pre-wrap; word-break: break-all;">
                        ${escapeHtml(textContent)}
                    </div>
                `;
            } catch (error) {
                console.error('Text file load error:', error);
                displayDiv.innerHTML = `
                    <div class="error-display">
                        <span class="icon">📝</span>
                        Failed to load text file
                    </div>
                `;
            }
        }

        async function getFileUrl(fileId) {
            const url = `${TELEGRAM_API}/getFile?file_id=${fileId}`;
            const response = await fetch(url);
            const data = await response.json();

            if (!data.ok || !data.result.file_path) {
                throw new Error('Invalid file path');
            }

            return `https://api.telegram.org/file/bot${BOT_TOKEN}/${data.result.file_path}`;
        }

        // ==================== POLLING ====================

        function startPolling() {
            console.log('Polling started...');
            fetchUpdates();
            pollingInterval = setInterval(fetchUpdates, POLL_DELAY);
        }

        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                console.log('Polling stopped');
            }
        }

        // ==================== INIT ====================

        if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE" || USER_ID === "YOUR_USER_ID_HERE") {
            waitingDiv.style.display = 'none';
            displayDiv.style.display = 'block';
            displayDiv.innerHTML = `
                <div class="error-display">
                    <span class="icon">⚙️</span>
                    Please configure BOT_TOKEN and USER_ID<br>
                    <small style="font-size:1rem;">Edit the CONFIGURATION section in the script</small>
                </div>
            `;
        } else {
            updateBattery();
            startPolling();
        }

        window.addEventListener('beforeunload', () => {
            stopPolling();
            stopClock();
        });
    </script>
</body>
</html>
